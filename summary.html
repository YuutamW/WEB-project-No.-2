<!--
sumamry.html := reads Questions from localStorage;
groups Questions by page
show Question text + status
click question -> go to relevant pos in Presentation (exact)
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- =========================================================
         DLS QUESTIONS SUMMARY PAGE
         File: summary.html

         Purpose:
         - Shows all saved questions after / during a lecture.
         - Reads data from localStorage through question-manager.js.
         - Groups questions by PDF page.
         - Allows jumping back to the original question location.
    ========================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Summary</title>

    <!-- Project theme -->
    <link rel="stylesheet" href="css/theme.css">

    <!-- Summary page CSS -->
    <link rel="stylesheet" href="css/summary.css">

    <!-- Summary page logic -->
    <script src="js/summary.js" type="module" defer></script>
</head>

<body class="summary-page">
    <!-- =========================================================
         SUMMARY SHELL
         Purpose:
         Main wrapper for the summary screen.
    ========================================================== -->
    <main class="summary-shell">
        <!-- Summary header : Title and short explaination -->
        <header class="summary-header">
            <p class="summary-header__eyebrow">
                DLS Summary
            </p>

            <h1 class="summary-header__title">
                Question Summary
            </h1>

            <p class="summary-header__subtitle">
                All lecture questions grouped by presentation page
            </p>
        </header>

        <!-- Summary stats - Overview -->
        <section class="summary-stats" aria-label="Question Statistics">
            <article class="summary-stat-card">
                <span id="summaryTotalQuestions" class="summary-stat-card__value">
                    0
                </span>

                <!-- Open Questions 🙋🏻‍♂️ -->
                <span id="summaryOpenQuestions" class="summary-stat-card__label">
                    0
                </span>
            </article>

            <article class="summary-stat-card">
                <span id="summaryHottestPage" class="summary-stat-card__value">
                    -
                </span>

                <span class="summary-stat-card__label">
                    🌶️ Hottest Page 🔥
                </span>
            </article>

        </section>

        <!-- Summary Actions -->
        <section class="summary-actions">
            <a id="summaryBackToPresentationButton" class="summary-action-button summary-action-button--primary"
                href="presentetion.html">
                Back To Presentation 🔙
            </a>

            <button id="summaryRefreshButton" class="summary-action-button" type="button">
                Refresh Summary 🔃
            </button>
        </section>

        <!-- Question List -->
        <section id="summaryQuestionsList" class="summary-questions-list" aria-label="Questions grouped by page">

        </section>
    </main>

</body>

</html>
